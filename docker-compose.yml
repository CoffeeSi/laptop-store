# ──────────────────────────────────────────────
# Laptop Store – Full SRE Observability Stack
# ──────────────────────────────────────────────

networks:
  laptop-store-net:
    driver: bridge

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

services:

  # ── Application ──────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://backend:3000
        VITE_FRONTEND_URL: http://frontend:5173
    container_name: laptop-store-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - laptop-store-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laptop-store-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/laptop-store
      FRONTEND_URL: http://localhost:5173
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - laptop-store-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: laptop-store-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - laptop-store-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Observability Stack ───────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: laptop-store-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - laptop-store-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: laptop-store-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - laptop-store-net
    pid: host
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: laptop-store-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - laptop-store-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: laptop-store-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    networks:
      - laptop-store-net
    restart: unless-stopped
