volumes:
  mongo-data:
  prometheus-data:
  grafana-data:


services:
  mongo:
    image: mongo:latest
    container_name: laptop-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  backend:
    build: ./backend
    image: laptop-backend
    container_name: laptop-backend
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
      restart_policy:
        condition: on-failure
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/laptop_store
      - FRONTEND_URL=http://frontend
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-jwt_secret}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-smtp_user}
      - SMTP_PASS=${SMTP_PASS:-smtp_pass}

  frontend:
    build: ./frontend
    image: laptop-frontend
    container_name: laptop-frontend
    restart: always
    ports:
      - "4173:4173"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
      restart_policy:
        condition: on-failure
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://backend:5000}
      - VITE_FRONTEND_URL=${VITE_FRONTEND_URL:-http://frontend:4173}

  prometheus:
    image: prom/prometheus:latest
    container_name: laptop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    deploy:
      replicas: 1

  grafana:
    image: grafana/grafana:latest
    container_name: laptop-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      replicas: 1