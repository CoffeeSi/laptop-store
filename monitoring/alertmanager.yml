global:
  resolve_timeout: 5m
  smtp_require_tls: false

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default-receiver"
  routes:
    - matchers:
        - severity="critical"
      receiver: "critical-receiver"
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: "default-receiver"
    # Default receiver – extend with email/Slack/PagerDuty in production
    # email_configs:
    #   - to: "team@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"

  - name: "critical-receiver"
    # Critical alerts receiver – configure with on-call integration
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/..."
    #     channel: "#alerts-critical"
    #     title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname"]
