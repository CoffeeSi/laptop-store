# ──────────────────────────────────────────────────────────────────────
# Laptop Store – Docker Swarm Stack (BONUS +10 Points)
#
# Deploy with:
#   docker swarm init
#   docker stack deploy -c docker-stack.yml laptop-store
#
# Verify:
#   docker stack services laptop-store
#   docker service ls
# ──────────────────────────────────────────────────────────────────────

networks:
  laptop-store-overlay:
    driver: overlay
    attachable: true

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

services:

  # ── Application ──────────────────────────────

  frontend:
    image: laptop-store-frontend:latest
    ports:
      - target: 5173
        published: 5173
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - laptop-store-overlay

  backend:
    image: laptop-store-backend:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/laptop-store
      FRONTEND_URL: http://localhost:5173
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - laptop-store-overlay
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure
    networks:
      - laptop-store-overlay

  # ── Observability Stack ───────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: alert_rules
        target: /etc/prometheus/alert_rules.yml
    volumes:
      - prometheus-data:/prometheus
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure
    networks:
      - laptop-store-overlay

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - "--path.rootfs=/host"
    volumes:
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
      - type: bind
        source: /
        target: /host
        read_only: true
    ports:
      - target: 9100
        published: 9100
        protocol: tcp
        mode: host
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
    networks:
      - laptop-store-overlay

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    ports:
      - target: 9093
        published: 9093
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - laptop-store-overlay

  grafana:
    image: grafana/grafana:10.4.3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure
    networks:
      - laptop-store-overlay

configs:
  prometheus_config:
    file: ./monitoring/prometheus.yml
  alert_rules:
    file: ./monitoring/alert_rules.yml
  alertmanager_config:
    file: ./monitoring/alertmanager.yml
